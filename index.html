<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Damian Dunkley (DamianDL)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <main id="root">
      <div id="loading-message" class="loading-message">
        <p>Loading episodes...</p>
      </div>
      <div id="error-message" class="error-message hidden"></div>
      <form class="controls" aria-label="Episode filters">
        <label for="episode-select">Select episode:</label>
        <select id="episode-select">
          <option value="">All episodes</option>
        </select>

        <label for="filter-input">Find episodes:</label>
        <input type="text" id="filter-input" placeholder="Type to search..." />
      </form>
      <h1 id="episode-total">0 Episode(s)</h1>
      <p id="episode-count">Displaying 0 episode(s)</p>
      <section
        id="episodes"
        class="episodes-container"
        aria-live="polite"
      ></section>

      <template id="episode-card-template">
        <article class="episode-card">
          <div class="episode-header">
            <h2 class="episode-code"></h2>
            <p class="episode-numbers"></p>
          </div>
          <div class="episode-image">
            <img class="episode-image-img" src="" alt="" />
          </div>
          <div class="episode-name">
            <h3 class="episode-title"></h3>
          </div>
          <div class="episode-summary"></div>
          <div class="episode-link">
            <a
              class="episode-url"
              href=""
              target="_blank"
              rel="noopener noreferrer"
              >View on TVMaze</a
            >
          </div>
        </article>
      </template>
    </main>

    <footer class="attribution">
      <p>
        Data sourced from
        <a href="https://tvmaze.com/" target="_blank" rel="noopener noreferrer"
          >TVMaze.com</a
        >. See
        <a
          href="https://www.tvmaze.com/api#licensing"
          target="_blank"
          rel="noopener noreferrer"
          >licensing</a
        >.
      </p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
