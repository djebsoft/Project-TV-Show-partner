<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Damian Dunkley (DamianDL)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <main id="root">
      <div id="loading-message" class="loading-message">
        <p>Loading data...</p>
      </div>
      <div id="error-message" class="error-message hidden"></div>

      <section id="shows-view" aria-live="polite">
        <h1>TV Shows</h1>
        <form class="controls" aria-label="Show search controls">
          <label for="show-search-input">Find shows:</label>
          <input
            type="text"
            id="show-search-input"
            placeholder="Search by name, genre, or summary..."
          />
        </form>
        <p id="show-count">Displaying 0/0 show(s)</p>
        <section id="shows-list" class="shows-container"></section>
      </section>

      <section id="episodes-view" class="hidden" aria-live="polite">
        <nav class="episodes-nav">
          <a href="#" id="back-to-shows">Back to shows listing</a>
        </nav>
        <h1 id="current-show-title">Episodes</h1>
        <form class="controls" aria-label="Episode filters">
          <label for="episode-select">Select episode:</label>
          <select id="episode-select">
            <option value="">All episodes</option>
          </select>

          <label for="episode-search-input">Find episodes:</label>
          <input
            type="text"
            id="episode-search-input"
            placeholder="Search episodes..."
          />
        </form>
        <h2 id="episode-total">0 Episode(s)</h2>
        <p id="episode-count">Displaying 0 episode(s)</p>
        <section
          id="episodes"
          class="episodes-container"
          aria-live="polite"
        ></section>
      </section>
    </main>

    <footer class="attribution">
      <p>
        Data sourced from
        <a href="https://tvmaze.com/" target="_blank" rel="noopener noreferrer"
          >TVMaze.com</a
        >. See
        <a
          href="https://www.tvmaze.com/api#licensing"
          target="_blank"
          rel="noopener noreferrer"
          >licensing</a
        >.
      </p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
